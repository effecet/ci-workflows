name: gitleaks-sweep
on:
  schedule:
    - cron: "{CRON_MINUTE} 3 * * 1"   # Monday 03:XX UTC (stagger computed at render time)
  workflow_dispatch:

jobs:
  sweep:
    runs-on: {RUNS_ON_SWEEP}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (full history)
        run: |
          # Cross-arch: gitleaks publishes linux_x64 + linux_arm64 tarballs.
          # `uname -m` returns aarch64 on ARM (Pi/Graviton) and x86_64 on x64.
          case "$(uname -m)" in
            aarch64|arm64) GL_ARCH=arm64 ;;
            x86_64|amd64)  GL_ARCH=x64 ;;
            *)             echo "unsupported arch: $(uname -m)"; exit 2 ;;
          esac
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_${GL_ARCH}.tar.gz" \
            | tar -xz -C /tmp gitleaks
          CONFIG_ARGS=()
          if [ -f .gitleaks.toml ]; then CONFIG_ARGS+=(--config .gitleaks.toml); fi
          /tmp/gitleaks detect "${CONFIG_ARGS[@]}" --source . --exit-code 1 --verbose

      {{include: _snippets/notify_on_failure.yml}}
