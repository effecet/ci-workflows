name: ci
on: [push, pull_request]

jobs:
  lint-test:
    runs-on: {RUNS_ON_LINT_TEST}
    steps:
      - uses: actions/checkout@v4

      {{include: _snippets/setup_uv.yml}}

      {{include: _snippets/install_deps_uv.yml}}

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        # Task 2.2: -n auto parallelises across the runner's cores via
        # pytest-xdist (installed in install_deps_uv). Caller suites that
        # are too tiny to benefit still pass; if auto over-spawns on a
        # micro-suite, the per-caller fix is to pin -n2 in that repo.
        run: pytest -q -n auto

      {{include: _snippets/notify_on_failure.yml}}

  gitleaks-fast:
    runs-on: {RUNS_ON_GITLEAKS_FAST}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Ensure gitleaks (baked, else retry-curl)
        run: |
          # arm64-runner bakes gitleaks 8.30.1 into pi-ci-runner:v3.1 — use it
          # with ZERO network. Any other runner: retry-wrapped (3×, backoff)
          # curl of the pinned static binary. Cross-arch: gitleaks publishes
          # linux_x64 + linux_arm64; uname -m → aarch64 on ARM, x86_64 on x64.
          if command -v gitleaks >/dev/null 2>&1; then exit 0; fi
          case "$(uname -m)" in
            aarch64|arm64) GL_ARCH=arm64 ;;
            x86_64|amd64)  GL_ARCH=x64 ;;
            *)             echo "unsupported arch: $(uname -m)"; exit 2 ;;
          esac
          for i in 1 2 3; do
            curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_${GL_ARCH}.tar.gz" \
              | tar -xz -C /usr/local/bin gitleaks && exit 0; sleep $((i * 5))
          done
          echo "gitleaks unavailable after retries"; exit 1
      - name: Gitleaks (no-git, PR diff only)
        run: |
          # Use .gitleaks.toml if the caller has one; otherwise fall back to gitleaks defaults.
          CONFIG_ARGS=()
          if [ -f .gitleaks.toml ]; then CONFIG_ARGS+=(--config .gitleaks.toml); fi
          gitleaks detect --no-git "${CONFIG_ARGS[@]}" --source . --exit-code 1 --verbose \
            || (echo "Gitleaks found secrets — review job logs"; exit 1)

      {{include: _snippets/notify_on_failure.yml}}
