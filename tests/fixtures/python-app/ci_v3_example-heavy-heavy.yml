          uv python install 3.12
          # Per-job venv (workspace is fresh each run; recreating is ~5-15s warm-cache).
          uv venv --python 3.12 "$GITHUB_WORKSPACE/.venv"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          # Perf (Task 2.2): byte-compile installed wheels so first import in the
          # test step is not paying .pyc compilation cost. Persists in the warm
          # ~/.cache/uv on the self-hosted runner.
          echo "UV_COMPILE_BYTECODE=1" >> "$GITHUB_ENV"
          # Self-hosted (arm64-runner) persistent disk warm-caches ~/.cache/uv (wheel
          # cache) AND ~/.local/share/uv/python (managed Pythons).
          # Shell-install (not astral-sh/setup-uv@v8) — Forgejo's data.forgejo.org
          # mirror lacked the v8 tag (verified 2026-05-14).

      - name: Install dependencies
        run: |
          # Only editable-install if this is actually a Python package. uv's own
          # heuristic: a [project]/[build-system] table in pyproject.toml, OR a
          # setup.py / setup.cfg. Config-only pyproject.toml (e.g. just
          # [tool.pytest.ini_options]) is NOT a package — skip the editable install
          # and rely on requirements*.txt. No `|| true`: a real package with a
          # broken build still fails loudly.
